name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Validate composer file
        run: composer validate --no-check-publish || true
      - name: Placeholder
        run: echo "Install dependencies and run tests once Laravel app bootstrap is added."
