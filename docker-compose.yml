services:
  app:
    image: php:8.3-cli
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: tail -f /dev/null
    depends_on:
      - database
      - redis

  database:
    image: postgres:16
    environment:
      POSTGRES_DB: order_flow
      POSTGRES_USER: order_flow
      POSTGRES_PASSWORD: order_flow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres-data:
